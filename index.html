<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>BookNest - Tu biblioteca digital</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            color: #0f172a;
            line-height: 1.5;
        }
        /* Header global estará inyectado por main.js, pero definimos un contenedor */
        #app {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .global-header {
            background: #ffffff;
            backdrop-filter: blur(8px);
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
        }
        .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .nav-links a {
            text-decoration: none;
            color: #334155;
            font-weight: 500;
            transition: 0.2s;
        }
        .nav-links a:hover {
            color: #3b82f6;
        }
        .user-area {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }
        .btn-outline {
            padding: 0.5rem 1rem;
            border-radius: 40px;
            border: 1px solid #cbd5e1;
            background: white;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }
        .btn-outline:hover {
            background: #f1f5f9;
        }
        .btn-primary {
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            border: none;
            background: #3b82f6;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-primary:hover {
            background: #2563eb;
        }
        .main-content {
            flex: 1;
            padding: 2rem;
        }
        footer {
            text-align: center;
            padding: 1.5rem;
            border-top: 1px solid #e2e8f0;
            color: #64748b;
            font-size: 0.875rem;
        }
        @media (max-width: 768px) {
            .global-header {
                flex-direction: column;
                align-items: stretch;
            }
            .nav-links {
                justify-content: center;
            }
            .user-area {
                justify-content: center;
            }
            .main-content {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- El header y el contenido se inyectarán dinámicamente -->
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
